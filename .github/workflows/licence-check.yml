name: licence-check.yml
on:
  push:
    branches:
      - '*'

jobs:
  spotless-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Spotless check (essencium-backend)
        run: mvn -B -ntp spotless:check
        working-directory: essencium-backend
      - name: Spotless check (essencium-backend-development)
        run: mvn -B -ntp spotless:check
        working-directory: essencium-backend-development
      - name: Spotless check (essencium-backend-development-uuid)
        run: mvn -B -ntp spotless:check
        working-directory: essencium-backend-development-uuid

  yml-licence-header-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check YAML licence headers
        run: |
          header="# Copyright (C) 2026 Frachtwerk GmbH, Leopoldstraße 7C, 76133 Karlsruhe."
          fail=0
          while IFS= read -r -d '' file; do
            head=$(head -n 1 "$file" | tr -d '\r')
            if [[ "$head" != "$header" ]]; then
              echo "::error file=$file::Licence header missing or incorrect."
              echo "Found:"
              echo "$head"
              fail=1
            fi
          done < <(find . -type d -name target -prune -o -type f \( -name "*.yml" -o -name "*.yaml" \) ! -name "pnpm-lock.yaml" -print0)
          if [[ $fail -eq 1 ]]; then
            exit 1
          fi
