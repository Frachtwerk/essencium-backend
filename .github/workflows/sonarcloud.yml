name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with: # running setup-java again overwrites the settings.xml
          distribution: 'temurin'
          java-version: '21'
          server-id: central
          server-username: MAVEN_USERNAME # env variable for username in deploy
          server-password: MAVEN_PASSWORD # env variable for token in deploy
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }} # Value of the GPG private key to import
          gpg-passphrase: MAVEN_GPG_PASSPHRASE # env variable for GPG private key passphrase
          cache: 'maven'
      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn test jacoco:prepare-agent surefire:test jacoco:report -pl essencium-backend -Dskip.integration.tests
          mvn test jacoco:prepare-agent-integration failsafe:integration-test failsafe:verify jacoco:report-integration -pl essencium-backend -Dskip.unit.tests
          mvn jacoco:merge jacoco:report -pl essencium-backend
          mvn verify -pl essencium-backend -Dskip.integration.tests -Dskip.unit.tests -Dgpg.skip=true
          mvn sonar:sonar -pl essencium-backend -am -Dsonar.projectKey=Frachtwerk_essencium-backend -Dsonar.organization=frachtwerk -Dsonar.host.url=https://sonarcloud.io -Dsonar.coverage.jacoco.xmlReportPaths=essencium-backend/target/site/jacoco/jacoco.xml -Dsonar.junit.reportPaths=essencium-backend/target/surefire-reports,essencium-backend/target/failsafe-reports -Dsonar.tests=essencium-backend/src/test,essencium-backend/src/testIntegration
