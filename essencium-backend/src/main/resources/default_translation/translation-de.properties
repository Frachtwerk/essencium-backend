privacyPolicy.content=<br /> <p class="title is-5">Wer ist verantwortlich?</p> <p> Verantwortliche Stelle fĂĽr diese Seite und damit fĂĽr die Erhebung Ihrer Daten ist die Frachtwerk GmbH: </p> <br /> <p> <span>Frachtwerk GmbH<br />Gr. PrĂ¤sidentenstraĂźe 10<br />10178 Berlin</span> </p> <br /> <p class="title is-6"> Unseren Datenschutzbeauftragten erreichen Sie ĂĽber: </p> <p> BjĂ¶rn Hoffmann<br /><a href="mailto:datenschutz@frachtwerk.de">datenschutz@frachtwerk.de</a></p> <br /> <p class="title is-5">Welche Daten werden erhoben?</p> <p>Diese Seite ist explizit so gebaut, dass fĂĽr den Betrieb (fast) keine Daten von Ihnen notwendig sind. Es werden lediglich die ĂĽblichen Logdateien auf dem Server geschrieben. Diese beinhalten: </p> <ul style="list-style-type: disc; margin-left: 1rem"> <li>Ihre IP-Adresse</li> <li>die Seite, die Sie aufrufen</li> <li>die Uhrzeit, zu der Sie die Seite aufgerufen haben</li> <li>von welcher Ursprungsseite Sie hierher geleitet wurden</li> <li>welchen Browser und welches Betriebssystem Sie verwenden</li> </ul> <br /> <p> Diese Daten verwenden wir, um zum einen analysieren zu kĂ¶nnen, wie viele (unterschiedliche) Besucher zu welcher Zeit unsere Seite besuchen (und woher sie kommen) und zum anderen, um im Fall eines Angriffs nachvollziehen zu kĂ¶nnen, woher die Zugriffe kamen. </p> <br /> <p>Rechtsgrundlage fĂĽr die Erhebung der Daten ist einerseits das berechtigte Interesse in Art. 6 Abs. 1 lit. f DSGVO, um unsere Website zu verbessern und die ErfĂĽllung einer rechtlichen Pflicht in Art. 6 Abs. 1 lit. c DSGVO, da wir sicherstellen mĂĽssen, im Falle eines Angriffs adĂ¤quat reagieren und diesen Angriff auswerten zu kĂ¶nnen.</p> <br /> <p>Zur Nutzung der App wird ein Account angelegt. In diesem werden die folgenden personenbezogenen Daten von Ihnen gespeichert:</p> <ul style="list-style-type: disc; margin-left: 1rem"> <li>Ihre E-mail-Adresse</li> <li>Ihr Vor- und Nachname</li> <li>Ihr Passwort</li> </ul> <br /> <p>Mit Ihrem Profil kĂ¶nnen die folgenden Daten verknĂĽpft werden: </p> <ul> <li>...</li> <li>...</li>           <li>...</li>           <li>...</li>           <li>...</li>         </ul>         <br />         <p>           Rechtsgrundlage fĂĽr die Erhebung und Speicherung der Daten ist die ErfĂĽllung eines VertragsverhĂ¤ltnisses           entsprechend Art. 6 Abs. 1 Lit. b DSGVO.         </p>          <p class="title is-5">Was passiert mit den Daten?</p>         <p>           Ihre Daten nutzen wir ausschlieĂźlich, um selbst etwas ĂĽber die Nutzung unserer Website zu lernen und z.B.           festzustellen, welche unserer Funktionen besonders interessant sind. Wir geben die Daten zu keiner Zeit an           irgendeinen Dritten weiter! Wir nutzen zwar mit der           <a href="https://netcup.de/" noreferrer>Netcup GmbH</a> einen Rechenzentrums-Anbieter, der in unserem Auftrag           unsere Server betreibt, dieser hat jedoch keinen Zugriff auf Ihre Daten. Auch unser Anbieter fĂĽr Backups, die           <a href="https://ultravps.eu/de/" noreferrer>Bradler & Krantz GmbH & Co. KG</a>           hat keinen Zugriff auf die gespeicherten Daten, da wir diese dort nur verschlĂĽsselt ablegen.         </p>         <br />         <p class="title is-5">Wie lange werden meine Daten gespeichert?</p>         <p>           Logfiles speichern wir fĂĽr eine LĂ¤nge von 12 Monaten. Ihre Profildaten speichern wir, bis sie von Ihnen           gelĂ¶scht werden. Die Speicherung erfolgt ausschlieĂźlich auf unseren Servern in Deutschland und in den           Niederlanden.         </p>         <br />         <p class="title is-5">Wie werden meine Daten geschĂĽtzt?</p>          <p>           Wir legen viel Wert darauf, dass Ihre Daten bei uns sicher sind! Deshalb setzen wir verschiedene Techniken ein, um sie zu schĂĽtzen. Dazu gehĂ¶ren           u.a.:         </p>         <ul style="list-style-type: disc; margin-left: 1rem">           <li>eine Firewall vor allen unseren Servern</li>           <li>Trennung unserer Server in verschiedene Netze</li>           <li> automatische Verwendung von VerschlĂĽsselungen in der Ăśbertragung (SSL bzw. TLS) </li>           <li>eine sorgfĂ¤ltige Auswahl unserer Administratoren</li>           <li>eine stĂ¤ndige Weiterbildung der Verantwortlichen</li>           <li>regelmĂ¤Ăźige Aktualisierungen der Serverbetriebssysteme</li>           <li>PrĂĽfungen der MaĂźnahmen durch Externe</li>         </ul>         <br />         <p class="title is-5">Welche Rechte habe ich?</p>          <p> Sie haben bei uns natĂĽrlich alle Rechte, die Ihnen laut DSGVO zustehen! Dazu gehĂ¶ren u.a.: </p>         <ul style="list-style-type: disc; margin-left: 1rem">           <li>             <strong>Recht auf LĂ¶schung</strong>: Auf Wunsch lĂ¶schen wir jederzeit alle Daten, die wir von Ihnen erhoben             haben           </li>           <li>             <strong>Recht auf Auskunft</strong>: Sie kĂ¶nnen bei uns jederzeit erfragen, welche Daten wir von Ihnen             gespeichert haben           </li>           <li>             <strong>Recht auf Berichtigung</strong>: Sollten die von uns erhobenen Daten fehlerhaft sein, kĂ¶nnen Sie uns             stets informieren und wir berichtigen die Fehler           </li>           <li>             <strong>Recht auf Ăśbertragung</strong>: Wenn Sie mĂ¶chten, kĂ¶nnen wir Ihnen die erhobenen Daten gerne             ĂĽbertragen           </li>           <li>             <strong>Recht auf EinschrĂ¤nkung in der Verarbeitung</strong>: Wenn Sie mĂ¶chten, kĂ¶nnen wir Ihre Daten gerne             von der Verarbeitung ausnehmen (in dem Fall wĂĽrden wir sie einfach lĂ¶schen)           </li>           <li>             <strong>Recht auf Beschwerde</strong>: Sie kĂ¶nnen sich bei einer AufsichtsbehĂ¶rde ĂĽber uns beschweren â€“ wir             wĂĽrden uns natĂĽrlich freuen, wenn Sie vorher auf uns zukommen!           </li>         </ul>         <br />         <p>All diese Rechte stehen Ihnen natĂĽrlich kostenlos zur VerfĂĽgung!</p>         <br />         <p class="title is-5">An wen kann ich mich wenden?</p>         <p>           Falls Sie noch Fragen haben, kĂ¶nnen Sie sich jederzeit an unseren Datenschutzbeauftragten wenden:           <a href="mailto:datenschutz@frachtwerk.de">datenschutz@frachtwerk.de</a>.         </p>
